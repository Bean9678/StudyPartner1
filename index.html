<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StudyPartner - Kết Nối & Họ̣c Tập</title>
  <meta name="description" content="Kết nối và trò chuyện cùng bạn học. Tìm kiếm đối tác học tập theo sở thích riêng của bạn.">
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="auth-container glass-panel animate-fade-up">
    <div class="auth-header">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" width="56" height="56" fill="none" stroke="url(#paint0_linear)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <defs>
            <linearGradient id="paint0_linear" x1="0" y1="0" x2="24" y2="24" gradientUnits="userSpaceOnUse">
              <stop stop-color="#a78bfa" />
              <stop offset="1" stop-color="#ec4899" />
            </linearGradient>
          </defs>
          <path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path>
        </svg>
      </div>
      <h1>StudyPartner</h1>
      <p>Kết nối và học tập cùng bạn bè ngay lập tức.</p>
    </div>

    <!-- Login Form -->
    <div id="login-section">
      <form id="login-form">
        <div class="input-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required placeholder="name@example.com">
        </div>
        <div class="input-group">
          <label for="login-password">Mật khẩu</label>
          <input type="password" id="login-password" required placeholder="Nhập mật khẩu của bạn">
        </div>
        <div class="error-message" id="login-error"></div>
        <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
      </form>
      
      <div class="divider">
        <span>HOẶC</span>
      </div>
      
      <button id="btn-google-login" class="btn btn-secondary btn-block btn-icon" type="button">
        <svg viewBox="0 0 24 24" width="20" height="20" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Đăng nhập bằng Google
      </button>

      <p class="auth-switch">Chưa có tài khoản? <a href="#" id="switch-to-register">Đăng ký tại đây</a></p>
    </div>

    <!-- Register Form -->
    <div id="register-section" style="display: none;">
      <form id="register-form">
        <div class="input-group">
          <label for="register-username">Tên hiển thị</label>
          <input type="text" id="register-username" required placeholder="Chọn một tên người dùng">
        </div>
        <div class="input-group">
          <label for="register-email">Email</label>
          <input type="email" id="register-email" required placeholder="name@example.com">
        </div>
        <div class="input-group">
          <label for="register-password">Mật khẩu</label>
          <input type="password" id="register-password" required placeholder="Tối thiểu 6 ký tự">
        </div>
        <div class="error-message" id="register-error"></div>
        <button type="submit" class="btn btn-primary btn-block">Tạo tài khoản</button>
      </form>
      <p class="auth-switch">Đã có tài khoản? <a href="#" id="switch-to-login">Đăng nhập</a></p>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
